events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging settings (Phase 6 requirement)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    upstream epicbook_backend {
        # Using the Docker service name 'app' and internal port 3000
        server app:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Optional: Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";

        # Route for Static Assets (Phase 4 requirement)
        # Note: We can serve images/css directly through Nginx for better performance
        location /assets/ {
            proxy_pass http://epicbook_backend;
        }

        # Main Routing Logic
        location / {
            proxy_pass http://epicbook_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
