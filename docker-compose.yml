version: '3.8'

services:
  # --- Reverse Proxy (Nginx) ---
  proxy:
    image: nginx:alpine
    container_name: epicbook_proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/proxy:/var/log/nginx
    networks:
      - frontend_nw
    depends_on:
      app:
        condition: service_healthy

  # --- Application (Node.js) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epicbook_app
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_NAME=bookstore
    networks:
      - frontend_nw
      - backend_nw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy

  # --- Database (MySQL) ---
  db:
    image: mysql:8.0
    container_name: epicbook_db
    restart: always
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - backend_nw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$MYSQL_USER", "-p$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  frontend_nw:
    driver: bridge
  backend_nw:
    internal: true  # Hardening: Isolation from the outside world

volumes:
  db_data:
